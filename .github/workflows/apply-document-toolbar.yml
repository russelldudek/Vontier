name: Apply unified document toolbar

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply document navigation and copy changes
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          root = Path('.')
          docs = {
              'resume.html': ('Resume', 'docs/Russell-Dudek-Vontier-Resume.pdf', 'Russell-Dudek-Vontier-Resume.pdf'),
              'cover-letter.html': ('Cover Letter', 'docs/Russell-Dudek-Vontier-Cover-Letter.pdf', 'Russell-Dudek-Vontier-Cover-Letter.pdf'),
              'executive-brief.html': ('Executive Brief', 'docs/Russell-Dudek-Vontier-Executive-Brief.pdf', 'Russell-Dudek-Vontier-Executive-Brief.pdf'),
              'interview-brief.html': ('Interview Brief', 'docs/Russell-Dudek-Vontier-Interview-Brief.pdf', 'Russell-Dudek-Vontier-Interview-Brief.pdf'),
              '120-day-plan.html': ('120-Day Plan', 'docs/Russell-Dudek-Vontier-120-Day-Plan.pdf', 'Russell-Dudek-Vontier-120-Day-Plan.pdf'),
              'leadership-advantage.html': ('Leadership Advantage', 'docs/Russell-Dudek-Vontier-Leadership-Advantage.pdf', 'Russell-Dudek-Vontier-Leadership-Advantage.pdf'),
          }
          nav = [
              ('Resume', 'resume.html'),
              ('Cover Letter', 'cover-letter.html'),
              ('Executive Brief', 'executive-brief.html'),
              ('Interview Brief', 'interview-brief.html'),
              ('120-Day Plan', '120-day-plan.html'),
              ('Leadership Advantage', 'leadership-advantage.html'),
          ]

          for filename, (current, pdf, download_name) in docs.items():
              links = []
              for label, href in nav:
                  active = ' is-active' if label == current else ''
                  aria = ' aria-current="page"' if label == current else ''
                  links.append(f'<a class="btn doc-tab{active}" href="{href}"{aria}>{label}</a>')
              links.append(
                  f'<a class="btn btn-primary doc-download" href="{pdf}" '
                  f'download="{download_name}" data-download-current>Download Current PDF</a>'
              )
              toolbar = (
                  '<div class="doc-toolbar screen-only" aria-label="Candidate documents">'
                  + ''.join(links)
                  + '</div>'
              )
              path = root / filename
              text = path.read_text(encoding='utf-8')
              updated, count = re.subn(
                  r'<div class="doc-toolbar screen-only"(?: aria-label="Candidate documents")?>.*?</div>',
                  toolbar,
                  text,
                  count=1,
                  flags=re.S,
              )
              if count != 1:
                  raise SystemExit(f'Could not replace toolbar in {filename}: {count}')
              path.write_text(updated, encoding='utf-8')

          leadership = root / 'leadership-advantage.html'
          text = leadership.read_text(encoding='utf-8')
          interview_block = re.compile(
              r'<div class="brief-card"><h3>Interview proof move</h3><p>.*?</p></div>',
              flags=re.S,
          )
          text, count = interview_block.subn('', text, count=1)
          if count != 1 and 'Interview proof move' in text:
              raise SystemExit('Could not remove interview proof block')
          text = text.replace(
              '<div class="brief-card"><h3>Leadership promise</h3>',
              '<div class="brief-card full"><h3>Leadership promise</h3>',
          )
          leadership.write_text(text, encoding='utf-8')

          css_path = root / 'styles-doc.css'
          css = css_path.read_text(encoding='utf-8')
          old_css = '.doc-toolbar { display:flex; gap:.7rem; flex-wrap:wrap; justify-content:flex-end; margin-bottom:1rem; }'
          new_css = '''.doc-toolbar { display:flex; gap:.55rem; flex-wrap:wrap; align-items:center; justify-content:flex-start; margin-bottom:1rem; padding:.75rem; border:1px solid var(--line); border-radius:18px; background:rgba(255,255,255,.78); box-shadow:0 10px 28px rgba(0,50,45,.06); }
          .doc-toolbar .btn { padding:.66rem .86rem; font-size:.82rem; }
          .doc-toolbar .doc-tab.is-active { background:var(--vontier-mist); color:var(--vontier-teal-dark); border-color:rgba(0,163,155,.32); box-shadow:inset 0 0 0 1px rgba(0,163,155,.08); }
          .doc-toolbar .doc-download { margin-left:auto; }'''
          if old_css in css:
              css = css.replace(old_css, new_css)
          elif '.doc-toolbar .doc-download' not in css:
              raise SystemExit('Document-toolbar CSS insertion point not found')
          css_path.write_text(css, encoding='utf-8')

          responsive = root / 'styles-responsive.css'
          text = responsive.read_text(encoding='utf-8')
          old = '''  .doc-contact { font-size:.72rem; }
          }'''
          new = '''  .doc-contact { font-size:.72rem; }
            .doc-toolbar { padding:.65rem; gap:.45rem; }
            .doc-toolbar .btn { flex:1 1 calc(50% - .45rem); padding:.64rem .7rem; }
            .doc-toolbar .doc-download { flex-basis:100%; margin-left:0; }
          }'''
          if old in text:
              text = text.replace(old, new)
          elif '.doc-toolbar .doc-download { flex-basis:100%' not in text:
              raise SystemExit('Responsive toolbar insertion point not found')
          responsive.write_text(text, encoding='utf-8')

          feedback = root / 'tests/user_feedback_regression.py'
          text = feedback.read_text(encoding='utf-8')
          addition = '''
          # Leadership advantage should present the candidate, not instruct Vontier how to interview him.
          leadership_text = (ROOT / "leadership-advantage.html").read_text(encoding="utf-8")
          assert "Interview proof move" not in leadership_text
          assert "ask Russell to map" not in leadership_text

          # Every candidate document view should expose the full document set at the top.
          expected_doc_links = {
              "Resume": "resume.html",
              "Cover Letter": "cover-letter.html",
              "Executive Brief": "executive-brief.html",
              "Interview Brief": "interview-brief.html",
              "120-Day Plan": "120-day-plan.html",
              "Leadership Advantage": "leadership-advantage.html",
          }
          for page_name in DOC_PAGES[:-1]:
              soup = soup_for(page_name)
              toolbar_links = {a.get_text(" ", strip=True): a.get("href") for a in soup.select(".doc-toolbar a")}
              for label, expected_href in expected_doc_links.items():
                  assert toolbar_links.get(label) == expected_href, (page_name, label, toolbar_links.get(label))
              current = soup.select_one('.doc-toolbar a[aria-current="page"]')
              assert current is not None, page_name
              download = soup.select_one('.doc-toolbar a[data-download-current]')
              assert download is not None, page_name
              assert download.has_attr("download"), page_name
              assert not download.has_attr("target"), page_name

          '''
          marker = '# Render the actual hero and navigation rules with system Chromium.'
          if 'expected_doc_links = {' not in text:
              text = text.replace(marker, addition + marker)
          feedback.write_text(text, encoding='utf-8')

          qa = root / 'tests/qa.py'
          text = qa.read_text(encoding='utf-8')
          old = '''resume = BeautifulSoup((root / 'resume.html').read_text(), 'html.parser')
          cover = BeautifulSoup((root / 'cover-letter.html').read_text(), 'html.parser')
          assert resume.find('a', string=lambda value: value and 'View Cover Letter' in value)
          assert cover.find('a', string=lambda value: value and 'View Resume' in value)
          assert resume.find('a', string=lambda value: value and 'Download PDF' in value)
          assert cover.find('a', string=lambda value: value and 'Download PDF' in value)
          '''
          new = '''document_pages = {
              'resume.html': 'Resume',
              'cover-letter.html': 'Cover Letter',
              'executive-brief.html': 'Executive Brief',
              'interview-brief.html': 'Interview Brief',
              '120-day-plan.html': '120-Day Plan',
              'leadership-advantage.html': 'Leadership Advantage',
          }
          for page_name, current_label in document_pages.items():
              soup = BeautifulSoup((root / page_name).read_text(), 'html.parser')
              toolbar = soup.select_one('.doc-toolbar')
              assert toolbar is not None, page_name
              for href, label in document_pages.items():
                  assert toolbar.find('a', href=href, string=label), (page_name, label)
              current = toolbar.select_one('a[aria-current="page"]')
              assert current and current.get_text(strip=True) == current_label, page_name
              download = toolbar.select_one('a[data-download-current]')
              assert download and download.has_attr('download'), page_name
              assert not download.has_attr('target'), page_name
          '''
          if old in text:
              text = text.replace(old, new)
          elif 'document_pages = {' not in text:
              raise SystemExit('QA toolbar assertion block not found')
          needle = "    assert 'github.com/russelldudek/vontier' not in lowered, name\n"
          extra = "    assert 'github.com/russelldudek/vontier' not in lowered, name\n    if name == 'Russell-Dudek-Vontier-Leadership-Advantage.pdf':\n        assert 'interview proof move' not in lowered, name\n        assert 'ask russell to map' not in lowered, name\n"
          if "assert 'interview proof move' not in lowered" not in text:
              text = text.replace(needle, extra)
          qa.write_text(text, encoding='utf-8')
          PY

      - name: Regenerate and verify documents
        run: |
          python -m pip install --disable-pip-version-check playwright beautifulsoup4 pypdf
          python scripts/generate_pdfs.py
          python tests/qa.py
          python tests/user_feedback_regression.py

      - name: Commit verified changes and remove one-shot workflows
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/apply-document-toolbar.yml
          rm -f .github/workflows/apply-direct-downloads.yml
          git add -A
          git commit -m "Unify document navigation and remove interview instruction"
          git pull --rebase origin main
          git push origin HEAD:main
